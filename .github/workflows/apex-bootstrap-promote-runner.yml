name: APEX Bootstrap Promote Canonical Runner

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/apex-bootstrap-promote-runner.yml

permissions:
  contents: read

jobs:
  promote:
    name: Promote canonical runner to public
    if: >-
      github.actor == 'GlacierEQ' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'apex/bootstrap-secret-probe-20260717'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_PAT: ${{ secrets.GH_PAT }}
      TARGET_REPO: GlacierEQ/public-actions-runner-host
      TARGET_REPO_ID: "1265621488"
      TARGET_OWNER_ID: "194243768"

    steps:
      - name: Require authorized bootstrap credential
        run: test -n "$GH_PAT"

      - name: Verify exact owner and target identity
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          token = os.environ["GH_PAT"]
          request = urllib.request.Request(
              f"https://api.github.com/repos/{os.environ['TARGET_REPO']}",
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "User-Agent": "apex-bootstrap-promote-runner",
              },
          )
          with urllib.request.urlopen(request, timeout=30) as response:
              repo = json.load(response)
          assert str(repo["id"]) == os.environ["TARGET_REPO_ID"]
          assert str(repo["owner"]["id"]) == os.environ["TARGET_OWNER_ID"]
          assert repo["full_name"] == os.environ["TARGET_REPO"]
          permissions = repo.get("permissions") or {}
          if permissions.get("admin") is not True:
              raise SystemExit("BOOTSTRAP_TOKEN_LACKS_TARGET_ADMIN")
          print(f"TARGET_IDENTITY_OK visibility={repo['visibility']}")
          PY

      - name: Promote exact canonical runner repository to public
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          token = os.environ["GH_PAT"]
          url = f"https://api.github.com/repos/{os.environ['TARGET_REPO']}"
          request = urllib.request.Request(
              url,
              method="PATCH",
              data=json.dumps({"visibility": "public"}).encode("utf-8"),
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "Content-Type": "application/json",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "User-Agent": "apex-bootstrap-promote-runner",
              },
          )
          with urllib.request.urlopen(request, timeout=30) as response:
              repo = json.load(response)
          assert str(repo["id"]) == os.environ["TARGET_REPO_ID"]
          assert repo["visibility"] == "public"
          assert repo["private"] is False
          print("CANONICAL_RUNNER_PROMOTED_PUBLIC=true")
          PY

      - name: Verify public read-back without credentials
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          with urllib.request.urlopen(
              f"https://api.github.com/repos/{os.environ['TARGET_REPO']}", timeout=30
          ) as response:
              repo = json.load(response)
          assert str(repo["id"]) == os.environ["TARGET_REPO_ID"]
          assert repo["visibility"] == "public"
          assert repo["private"] is False
          print("PUBLIC_READBACK_OK")
          PY
