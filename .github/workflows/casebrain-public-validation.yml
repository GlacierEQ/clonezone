name: CASEBRAIN Public Runner Validation

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/casebrain-public-validation.yml
      - jobs/casebrain-validation.json

permissions:
  contents: write

concurrency:
  group: casebrain-public-validation
  cancel-in-progress: true

jobs:
  validate:
    name: Validate AEON-777 CASEBRAIN controls
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SOURCE_REPO: GlacierEQ/AEON-777
      SOURCE_REF: casebrain-actor-registry-v1
      EXPECTED_SOURCE_SHA: 8e59a4f1c6854ecb50a41c79dc776268132d2aae
    steps:
      - name: Checkout public runner face
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Require private read bridge
        env:
          PRIVATE_READ_TOKEN: ${{ secrets.APEX_PRIVATE_READ_TOKEN || secrets.GH_PAT }}
        run: test -n "$PRIVATE_READ_TOKEN"

      - name: Checkout pinned private workload
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ env.SOURCE_REF }}
          token: ${{ secrets.APEX_PRIVATE_READ_TOKEN || secrets.GH_PAT }}
          path: workload
          fetch-depth: 1
          persist-credentials: false

      - name: Bind exact source revision
        run: |
          actual="$(git -C workload rev-parse HEAD)"
          test "$actual" = "$EXPECTED_SOURCE_SHA"
          test -z "$(git -C workload status --porcelain --untracked-files=no)"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: workload/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run CASEBRAIN schema, semantic, and negative controls
        working-directory: workload
        run: |
          npm ci --ignore-scripts --no-audit --no-fund
          npm test

      - name: Create exact-byte validation receipt
        run: |
          set -euo pipefail
          mkdir -p validation-receipt
          {
            echo "schema_version=1.0"
            echo "runner_repo=${GITHUB_REPOSITORY}"
            echo "runner_sha=${GITHUB_SHA}"
            echo "workflow=${GITHUB_WORKFLOW}"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "run_attempt=${GITHUB_RUN_ATTEMPT}"
            echo "source_repo=${SOURCE_REPO}"
            echo "source_ref=${SOURCE_REF}"
            echo "source_sha=${EXPECTED_SOURCE_SHA}"
            echo "generated_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo
            echo "artifact_sha256:"
            sha256sum \
              workload/package.json \
              workload/package-lock.json \
              workload/BRAIN/ACTORS/ACTOR_REGISTRY.json \
              workload/BRAIN/ACTORS/ACTOR_REGISTRY_SCHEMA.json \
              workload/BRAIN/ACTORS/ACTOR_FILE_LINK_MATRIX.csv \
              workload/BRAIN/CONNECTORS/CONNECTOR_FABRIC.json \
              workload/BRAIN/CONNECTORS/CONNECTOR_FABRIC_SCHEMA.json \
              workload/BRAIN/CONNECTORS/PROVENANCE_RECEIPT_SCHEMA.json \
              workload/BRAIN/CONNECTORS/MEMORY_TAXONOMY_AND_GOVERNANCE.md \
              workload/BRAIN/CONNECTORS/LEGACY_MEMORY_QUARANTINE_2026-07-16.md \
              workload/BRAIN/CONNECTORS/MEMORY_QUARANTINE_REGISTRY.json \
              workload/BRAIN/CONNECTORS/MEMORY_QUARANTINE_REGISTRY_SCHEMA.json \
              workload/BRAIN/CONNECTORS/MEMORY_RECALL_REGRESSION_SCHEMA.json \
              workload/BRAIN/CONNECTORS/MEMORY_RECALL_REGRESSION_2026-07-17.json \
              workload/BRAIN/CONNECTORS/MEMORY_ARCHITECTURE_DELTA_2026-07-17.md \
              workload/BRAIN/CONNECTORS/MEMORY_RETRIEVAL_GUARD_SCHEMA.json \
              workload/BRAIN/CONNECTORS/MEMORY_RETRIEVAL_GUARD_FIXTURE_2026-07-18.json \
              workload/BRAIN/CONNECTORS/MEMORY_RETRIEVAL_GUARD.md \
              workload/BRAIN/CONNECTORS/MEMORY_ARCHITECTURE_DELTA_2026-07-18.md \
              workload/BRAIN/CONNECTORS/MEMORY_ARCHITECTURE_CONSUMER_SCHEMA.json \
              workload/BRAIN/CONNECTORS/MEMORY_ARCHITECTURE_LIVE_CONSUMER_RECEIPT_2026-07-19.json \
              workload/BRAIN/CONNECTORS/MEMORY_ARCHITECTURE_DELTA_2026-07-19.md \
              workload/BRAIN/CONNECTORS/CONNECTOR_CANDIDATE_ENVELOPE_SCHEMA.json \
              workload/BRAIN/CONNECTORS/ACTOR_PROFILE_CONSUMER_SCHEMA.json \
              workload/BRAIN/CONNECTORS/ACTOR_PROFILE_LIVE_CONSUMER_RECEIPT_2026-07-20.json \
              workload/BRAIN/CONNECTORS/MEMORY_ARCHITECTURE_DELTA_2026-07-20.md
          } | tee validation-receipt/CASEBRAIN_PUBLIC_VALIDATION_RECEIPT.txt

      - name: Upload validation receipt
        uses: actions/upload-artifact@v4
        with:
          name: casebrain-public-validation-${{ env.EXPECTED_SOURCE_SHA }}
          path: validation-receipt/CASEBRAIN_PUBLIC_VALIDATION_RECEIPT.txt
          if-no-files-found: error
          retention-days: 90

      - name: Commit sanitized receipt to public runner host
        uses: actions/checkout@v4
        with:
          repository: GlacierEQ/clonezone
          ref: main
          token: ${{ github.token }}
          path: receipt-repo
          fetch-depth: 1

      - name: Publish receipt read-back
        run: |
          set -euo pipefail
          mkdir -p receipt-repo/receipts
          cp validation-receipt/CASEBRAIN_PUBLIC_VALIDATION_RECEIPT.txt \
            receipt-repo/receipts/CASEBRAIN_PUBLIC_VALIDATION_RECEIPT.txt
          cd receipt-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add receipts/CASEBRAIN_PUBLIC_VALIDATION_RECEIPT.txt
          if git diff --cached --quiet; then
            echo "Receipt already current"
          else
            git commit -m "receipt(casebrain): public validation ${EXPECTED_SOURCE_SHA}"
            git push origin HEAD:main
          fi
