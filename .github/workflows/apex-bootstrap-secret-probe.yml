name: APEX Public Bootstrap Secret Probe

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/apex-bootstrap-secret-probe.yml

permissions:
  contents: read

jobs:
  probe:
    name: Verify dedicated APEX bridge credentials
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout public bootstrap edge
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Verify public runner visibility
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import urllib.request

          with urllib.request.urlopen(
              "https://api.github.com/repos/GlacierEQ/clonezone", timeout=30
          ) as response:
              repo = json.load(response)
          assert repo["visibility"] == "public", repo["visibility"]
          assert repo["private"] is False
          print("PUBLIC_BOOTSTRAP_EDGE_OK")
          PY

      - name: Verify dedicated secret names and minimum scopes
        env:
          APEX_PRIVATE_READ_TOKEN: ${{ secrets.APEX_PRIVATE_READ_TOKEN }}
          APEX_CONTROL_TOKEN: ${{ secrets.APEX_CONTROL_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          def get_json(url: str, token: str) -> dict:
              request = urllib.request.Request(
                  url,
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {token}",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "User-Agent": "apex-bootstrap-secret-probe",
                  },
              )
              with urllib.request.urlopen(request, timeout=30) as response:
                  return json.load(response)

          private_read = os.environ.get("APEX_PRIVATE_READ_TOKEN", "")
          control = os.environ.get("APEX_CONTROL_TOKEN", "")
          if not private_read:
              raise SystemExit("APEX_PRIVATE_READ_TOKEN_MISSING")
          if not control:
              raise SystemExit("APEX_CONTROL_TOKEN_MISSING")

          workload = get_json(
              "https://api.github.com/repos/GlacierEQ/mastermind", private_read
          )
          if workload.get("full_name") != "GlacierEQ/mastermind":
              raise SystemExit("APEX_PRIVATE_READ_TOKEN_WRONG_REPOSITORY")
          if workload.get("private") is not True:
              raise SystemExit("MASTERMIND_EXPECTED_PRIVATE")

          control_repo = get_json(
              "https://api.github.com/repos/GlacierEQ/llm-runner-teams", control
          )
          if control_repo.get("full_name") != "GlacierEQ/llm-runner-teams":
              raise SystemExit("APEX_CONTROL_TOKEN_WRONG_REPOSITORY")
          if control_repo.get("private") is not True:
              raise SystemExit("CONTROL_PLANE_EXPECTED_PRIVATE")
          permissions = control_repo.get("permissions") or {}
          if permissions.get("push") is not True:
              raise SystemExit("APEX_CONTROL_TOKEN_CONTENTS_WRITE_NOT_PROVEN")

          print("APEX_PRIVATE_READ_TOKEN_PRESENT=true")
          print("APEX_PRIVATE_READ_TOKEN_MASTERMIND_READ=true")
          print("APEX_CONTROL_TOKEN_PRESENT=true")
          print("APEX_CONTROL_TOKEN_CONTROL_READ=true")
          print("APEX_CONTROL_TOKEN_CONTROL_WRITE=true")
          PY

      - name: Publish sanitized probe summary
        if: always()
        shell: bash
        run: |
          {
            echo "## APEX Public Bootstrap Probe"
            echo
            echo "- Public execution repository: \`${GITHUB_REPOSITORY}\`"
            echo "- Public runner SHA: \`${GITHUB_SHA}\`"
            echo "- Run ID: \`${GITHUB_RUN_ID}\`"
            echo "- Attempt: \`${GITHUB_RUN_ATTEMPT}\`"
            echo "- Secret values printed: **no**"
            echo "- Private file contents printed: **no**"
          } >> "$GITHUB_STEP_SUMMARY"
