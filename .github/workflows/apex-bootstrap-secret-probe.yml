name: APEX Public Bootstrap Secret Probe

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/apex-bootstrap-secret-probe.yml

permissions:
  contents: read

jobs:
  probe:
    name: Verify dedicated APEX bridge credentials
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout public bootstrap edge
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Verify public runner visibility
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import urllib.request

          with urllib.request.urlopen(
              "https://api.github.com/repos/GlacierEQ/clonezone", timeout=30
          ) as response:
              repo = json.load(response)
          assert repo["visibility"] == "public", repo["visibility"]
          assert repo["private"] is False
          print("PUBLIC_BOOTSTRAP_EDGE_OK")
          PY

      - name: APEX_PRIVATE_READ_TOKEN is present
        id: private_present
        continue-on-error: true
        env:
          APEX_PRIVATE_READ_TOKEN: ${{ secrets.APEX_PRIVATE_READ_TOKEN }}
        run: test -n "$APEX_PRIVATE_READ_TOKEN"

      - name: APEX_PRIVATE_READ_TOKEN can read mastermind
        id: private_scope
        continue-on-error: true
        env:
          APEX_PRIVATE_READ_TOKEN: ${{ secrets.APEX_PRIVATE_READ_TOKEN }}
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          token = os.environ.get("APEX_PRIVATE_READ_TOKEN", "")
          if not token:
              raise SystemExit("DEDICATED_PRIVATE_READ_TOKEN_MISSING")
          request = urllib.request.Request(
              "https://api.github.com/repos/GlacierEQ/mastermind",
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "User-Agent": "apex-bootstrap-secret-probe",
              },
          )
          with urllib.request.urlopen(request, timeout=30) as response:
              repo = json.load(response)
          assert repo.get("full_name") == "GlacierEQ/mastermind"
          assert repo.get("private") is True
          print("DEDICATED_PRIVATE_READ_SCOPE_OK")
          PY

      - name: APEX_CONTROL_TOKEN is present
        id: control_present
        continue-on-error: true
        env:
          APEX_CONTROL_TOKEN: ${{ secrets.APEX_CONTROL_TOKEN }}
        run: test -n "$APEX_CONTROL_TOKEN"

      - name: APEX_CONTROL_TOKEN can read and write control plane
        id: control_scope
        continue-on-error: true
        env:
          APEX_CONTROL_TOKEN: ${{ secrets.APEX_CONTROL_TOKEN }}
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          token = os.environ.get("APEX_CONTROL_TOKEN", "")
          if not token:
              raise SystemExit("DEDICATED_CONTROL_TOKEN_MISSING")
          request = urllib.request.Request(
              "https://api.github.com/repos/GlacierEQ/llm-runner-teams",
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "User-Agent": "apex-bootstrap-secret-probe",
              },
          )
          with urllib.request.urlopen(request, timeout=30) as response:
              repo = json.load(response)
          assert repo.get("full_name") == "GlacierEQ/llm-runner-teams"
          assert repo.get("private") is True
          permissions = repo.get("permissions") or {}
          if permissions.get("push") is not True:
              raise SystemExit("DEDICATED_CONTROL_WRITE_SCOPE_NOT_PROVEN")
          print("DEDICATED_CONTROL_READ_WRITE_SCOPE_OK")
          PY

      - name: Publish sanitized probe summary
        if: always()
        shell: bash
        env:
          PRIVATE_PRESENT: ${{ steps.private_present.outcome }}
          PRIVATE_SCOPE: ${{ steps.private_scope.outcome }}
          CONTROL_PRESENT: ${{ steps.control_present.outcome }}
          CONTROL_SCOPE: ${{ steps.control_scope.outcome }}
        run: |
          {
            echo "## APEX Public Bootstrap Probe"
            echo
            echo "- Public execution repository: \`${GITHUB_REPOSITORY}\`"
            echo "- Public runner SHA: \`${GITHUB_SHA}\`"
            echo "- Run ID: \`${GITHUB_RUN_ID}\`"
            echo "- Attempt: \`${GITHUB_RUN_ATTEMPT}\`"
            echo "- APEX_PRIVATE_READ_TOKEN present: **${PRIVATE_PRESENT}**"
            echo "- APEX_PRIVATE_READ_TOKEN mastermind read: **${PRIVATE_SCOPE}**"
            echo "- APEX_CONTROL_TOKEN present: **${CONTROL_PRESENT}**"
            echo "- APEX_CONTROL_TOKEN control read/write: **${CONTROL_SCOPE}**"
            echo "- Secret values printed: **no**"
            echo "- Private file contents printed: **no**"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce dedicated bridge result
        if: always()
        shell: bash
        env:
          PRIVATE_PRESENT: ${{ steps.private_present.outcome }}
          PRIVATE_SCOPE: ${{ steps.private_scope.outcome }}
          CONTROL_PRESENT: ${{ steps.control_present.outcome }}
          CONTROL_SCOPE: ${{ steps.control_scope.outcome }}
        run: |
          test "$PRIVATE_PRESENT" = success
          test "$PRIVATE_SCOPE" = success
          test "$CONTROL_PRESENT" = success
          test "$CONTROL_SCOPE" = success
