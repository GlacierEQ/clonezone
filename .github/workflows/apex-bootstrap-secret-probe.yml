name: APEX Public Bootstrap Secret Probe

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/apex-bootstrap-secret-probe.yml

permissions:
  contents: read

jobs:
  public-edge:
    name: Public edge is live
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify public runner visibility
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import urllib.request

          with urllib.request.urlopen(
              "https://api.github.com/repos/GlacierEQ/clonezone", timeout=30
          ) as response:
              repo = json.load(response)
          assert repo["visibility"] == "public", repo["visibility"]
          assert repo["private"] is False
          print("PUBLIC_BOOTSTRAP_EDGE_OK")
          PY

  private-read-bridge:
    name: Dedicated private-read bridge works
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      APEX_PRIVATE_READ_TOKEN: ${{ secrets.APEX_PRIVATE_READ_TOKEN }}
    steps:
      - name: Require dedicated private-read token
        run: test -n "$APEX_PRIVATE_READ_TOKEN"

      - name: Verify mastermind private read scope
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          token = os.environ["APEX_PRIVATE_READ_TOKEN"]
          request = urllib.request.Request(
              "https://api.github.com/repos/GlacierEQ/mastermind",
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "User-Agent": "apex-bootstrap-secret-probe",
              },
          )
          with urllib.request.urlopen(request, timeout=30) as response:
              repo = json.load(response)
          assert repo.get("full_name") == "GlacierEQ/mastermind"
          assert repo.get("private") is True
          print("DEDICATED_PRIVATE_READ_SCOPE_OK")
          PY

  control-bridge:
    name: Dedicated control read-write bridge works
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      APEX_CONTROL_TOKEN: ${{ secrets.APEX_CONTROL_TOKEN }}
    steps:
      - name: Require dedicated control token
        run: test -n "$APEX_CONTROL_TOKEN"

      - name: Verify control-plane read and write scope
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          token = os.environ["APEX_CONTROL_TOKEN"]
          request = urllib.request.Request(
              "https://api.github.com/repos/GlacierEQ/llm-runner-teams",
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "User-Agent": "apex-bootstrap-secret-probe",
              },
          )
          with urllib.request.urlopen(request, timeout=30) as response:
              repo = json.load(response)
          assert repo.get("full_name") == "GlacierEQ/llm-runner-teams"
          assert repo.get("private") is True
          permissions = repo.get("permissions") or {}
          if permissions.get("push") is not True:
              raise SystemExit("DEDICATED_CONTROL_WRITE_SCOPE_NOT_PROVEN")
          print("DEDICATED_CONTROL_READ_WRITE_SCOPE_OK")
          PY

  bridge-verdict:
    name: Dedicated bridge verdict
    if: always()
    needs: [public-edge, private-read-bridge, control-bridge]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Publish sanitized verdict
        env:
          PUBLIC_EDGE: ${{ needs.public-edge.result }}
          PRIVATE_READ: ${{ needs.private-read-bridge.result }}
          CONTROL_BRIDGE: ${{ needs.control-bridge.result }}
        shell: bash
        run: |
          {
            echo "## APEX Public Bootstrap Probe"
            echo
            echo "- Public edge: **${PUBLIC_EDGE}**"
            echo "- Dedicated private-read bridge: **${PRIVATE_READ}**"
            echo "- Dedicated control read/write bridge: **${CONTROL_BRIDGE}**"
            echo "- Secret values printed: **no**"
            echo "- Private file contents printed: **no**"
          } >> "$GITHUB_STEP_SUMMARY"
          test "$PUBLIC_EDGE" = success
          test "$PRIVATE_READ" = success
          test "$CONTROL_BRIDGE" = success
